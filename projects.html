    <script>
      (function() {
        try {
          let dbTheme = 'dark';
          let dbAccent = '#8750f7';
          try {
            const cached = localStorage.getItem('portfolio_data');
            if (cached) {
              const parsed = JSON.parse(cached);
              if (parsed.defaultTheme) dbTheme = parsed.defaultTheme;
              if (parsed.defaultHighlightColor) dbAccent = parsed.defaultHighlightColor;
            }
          } catch (e) {}

          const userTheme = localStorage.getItem('portfolio_user_theme');
          const theme = userTheme !== null ? userTheme : dbTheme;
          const accent = localStorage.getItem('portfolio_user_accent') || dbAccent;
          
          function hexToRgb(hex) {
            const shorthandRegex = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
            const fullHex = hex.replace(shorthandRegex, (m, r, g, b) => r + r + g + g + b + b);
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(fullHex);
            return result ? {
              r: parseInt(result[1], 16),
              g: parseInt(result[2], 16),
              b: parseInt(result[3], 16)
            } : null;
          }

          function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h = 0, s = 0, l = (max + min) / 2;
            if (max !== min) {
              const d = max - min;
              s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
              switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
              }
              h /= 6;
            }
            return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
          }

          function hslToHex(h, s, l) {
            l /= 100;
            const a = s * Math.min(l, 1 - l) / 100;
            const f = n => {
              const k = (n + h / 30) % 12;
              const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
              return Math.round(255 * color).toString(16).padStart(2, '0');
            };
            return `#${f(0)}${f(8)}${f(4)}`;
          }

          function getDarkerHex(hex, targetLightness = 15) {
            const rgb = hexToRgb(hex);
            if (!rgb) return '#140c1c';
            const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
            return hslToHex(hsl.h, hsl.s, targetLightness);
          }

          if (theme === 'system') {
            document.documentElement.removeAttribute('data-theme');
          } else {
            document.documentElement.setAttribute('data-theme', theme);
          }

          if (accent) {
            document.documentElement.style.setProperty('--accent-primary', accent);
            const rgb = hexToRgb(accent);
            if (rgb) {
              document.documentElement.style.setProperty('--accent-primary-rgb', rgb.r + ', ' + rgb.g + ', ' + rgb.b);
              const secondaryHex = getDarkerHex(accent, 15);
              document.documentElement.style.setProperty('--accent-secondary', secondaryHex);
            }
          }
        } catch (e) {
          console.error(e);
        }
      })();
    </script>
